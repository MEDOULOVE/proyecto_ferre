<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>FERREMAS - Iniciar Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#ff6b00;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h1>👤 Login Cliente</h1>

    <div id="mensaje"
         class="alert text-center"
         style="display:none;">
    </div>

    <div class="mb-3">

        <label>Correo Electrónico</label>

        <input type="email"
               id="email"
               class="form-control"
               placeholder="Ingrese su correo">

    </div>

    <div class="mb-4">

        <label>Contraseña</label>

        <input type="password"
               id="password"
               class="form-control"
               placeholder="Ingrese su contraseña">

    </div>

    <button class="btn btn-success w-100"
            onclick="login()">
        Iniciar Sesión
    </button>

</div>

<script>

    async function login(){

        const email =
            document.getElementById("email").value;

        const password =
            document.getElementById("password").value;

        const mensaje =
            document.getElementById("mensaje");

        try{

            const respuesta =
               await fetch("https://worthy-embrace-production-551b.up.railway.app/usuarios/login",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({
                        email: email,
                        password: password
                    })
                });

            mensaje.style.display = "block";

            if(respuesta.ok){

                const usuario = await respuesta.json();

                localStorage.setItem("usuario", JSON.stringify(usuario));

                // ✔ ESTO ES LO QUE FALTABA
                localStorage.setItem("email", usuario.email);

                mensaje.className =
                    "alert alert-success text-center";

                mensaje.innerText =
                    "✅ Bienvenido " + usuario.nombre;

                setTimeout(() => {

                    const retorno =
                        localStorage.getItem("paginaRetorno");

                    if (
                        retorno &&
                        retorno !== "null" &&
                        retorno !== "" &&
                        retorno !== "#" &&
                        retorno.includes(".html")
                    ) {

                        localStorage.removeItem("paginaRetorno");
                        window.location.href = retorno;

                    } else {

                        window.location.href = "VistaWebCliente.html";
                    }

                }, 1000);

            } else {

                mensaje.className =
                    "alert alert-danger text-center";

                mensaje.innerText =
                    "❌ Correo o contraseña incorrectos";
            }

        } catch(error){

            mensaje.className =
                "alert alert-danger text-center";

            mensaje.style.display = "block";

            mensaje.innerText =
                "❌ No se pudo conectar con el servicio de usuarios";

            console.error(error);
        }
    }

</script>

</body>
</html>
