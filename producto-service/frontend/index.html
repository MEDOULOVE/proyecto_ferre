<!DOCTYPE html>
<html lang="es">

<head>

    <title>DOMACO System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body {

            justify-content: center;
            align-items: center;
        }

        .menu-card {
            width: 550px;
            padding: 40px;
            border-radius: 20px;
            background: white;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: bold;
            color: #ff6b00;
        }

        .btn {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            font-size: 18px;
            border-radius: 12px;
            font-weight: bold;
        }

        .descripcion {
            color: gray;
            margin-bottom: 25px;
        }

    </style>

</head>

<body>

<div class="menu-card">

    <h1>Sistema DOMACO</h1>

    <p class="descripcion">
        Panel Administrativo Ferretería DOMACO
    </p>

    <a href="productos.html"
       class="btn btn-primary">
        🛠️ Gestión Productos
    </a>

    <a href="ventas.html"
       class="btn btn-success">
        💰 Gestión Ventas
    </a>

    <a href="Usuario.html"
       class="btn btn-warning">

    </a>

    <a href="VistaWebCliente.html"

        🛒 Portal Clientes
    </a>

</div>

</body>
</html>
