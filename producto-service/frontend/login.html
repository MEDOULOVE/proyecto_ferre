<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Login DOMACO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#ff6b00;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <h1>
        🔐 Login DOMACO
    </h1>

    <div class="mb-3">

        <label>Usuario Administrador</label>

        <input type="text"
               id="usuario"
               class="form-control"
               placeholder="Ingrese usuario">

    </div>

    <div class="mb-4">

        <label>Contraseña</label>

        <input type="password"
               id="password"
               class="form-control"
               placeholder="Ingrese contraseña">

    </div>

    <button class="btn btn-dark w-100"
            onclick="login()">

        Ingresar al Sistema

    </button>

</div>

<script>

    function login(){

        const usuario =
            document.getElementById("usuario").value;

        const password =
            document.getElementById("password").value;

        if(usuario === "admin" &&
           password === "1234"){

            alert("✅ Bienvenido Administrador");

            window.location.href = "index.html";

        }else{

            alert("❌ Usuario o contraseña incorrecta");
        }
    }

</script>

</body>
</html>
