<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>FERREMAS - Crear Cuenta</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: linear-gradient(to right, #141e30, #243b55);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card-registro{
            width:500px;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0 4px 20px rgba(0,0,0,0.3);
        }

        h1{
            text-align:center;
            color:#ff6b00;
            margin-bottom:25px;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="card-registro">

    <h1>👤 Crear Cuenta</h1>

    <div id="mensaje"
         class="alert text-center"
         style="display:none;">
    </div>

    <form id="usuarioForm">

        <div class="mb-3">
            <input type="text"
                   id="nombre"
                   class="form-control"
                   placeholder="Nombre"
                   required>
        </div>

        <div class="mb-3">
            <input type="text"
                   id="apellido"
                   class="form-control"
                   placeholder="Apellido"
                   required>
        </div>

        <div class="mb-3">
            <input type="email"
                   id="email"
                   class="form-control"
                   placeholder="Correo electrónico"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   id="password"
                   class="form-control"
                   placeholder="Contraseña"
                   required>
        </div>
        <div class="mb-3">
            <input type="password"
                   id="password2"
                   class="form-control"
                   placeholder="Repetir Contraseña"
                   required>
        </div>

        <div class="mb-3">
            <input type="text"
                   id="telefono"
                   class="form-control"
                   placeholder="Teléfono"
                   required>
        </div>

        <div class="mb-4">
            <input type="text"
                   id="direccion"
                   class="form-control"
                   placeholder="Dirección"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success w-100">
            Crear Cuenta
        </button>

    </form>

</div>

<script>

    window.onload = function() {

        document.getElementById("usuarioForm")
            .addEventListener("submit", async function(e){

                e.preventDefault();

                const password =
                    document.getElementById("password").value;

                const password2 =
                    document.getElementById("password2").value;

                // 🔥 VALIDACIÓN
                if (password !== password2) {

                    const mensaje =
                        document.getElementById("mensaje");

                    mensaje.style.display = "block";
                    mensaje.className =
                        "alert alert-danger text-center";

                    mensaje.innerText =
                        "❌ Las contraseñas no coinciden";

                    return;
                }

                const usuario = {

                    nombre:
                    document.getElementById("nombre").value,

                    apellido:
                    document.getElementById("apellido").value,

                    email:
                    document.getElementById("email").value,

                    password:
                    document.getElementById("password").value,

                    telefono:
                    document.getElementById("telefono").value,

                    direccion:
                    document.getElementById("direccion").value,

                    rol: "CLIENTE"
                };

                const mensaje =
                    document.getElementById("mensaje");

                try {

                    const respuesta =
                        await fetch("http://localhost:8084/usuarios", {

                            method: "POST",

                            headers: {
                                "Content-Type": "application/json"
                            },

                            body: JSON.stringify(usuario)
                        });

                    mensaje.style.display = "block";

                    console.log("STATUS:", respuesta.status);

                    if (respuesta.ok) {

                        mensaje.style.display = "block";
                        mensaje.className =
                            "alert alert-success text-center";

                        mensaje.innerText =
                            "✅ Cuenta creada correctamente. Redirigiendo...";

                        document.getElementById("usuarioForm").reset();
                        localStorage.setItem(
                            "usuario",
                            JSON.stringify(usuario)
                        );

                        setTimeout(() => {

                            window.location.href =
                                "VistaWebCliente.html";

                        }, 1500);


                    } else {

                        const error =
                            await respuesta.json();

                        mensaje.className =
                            "alert alert-danger text-center";

                        mensaje.innerText =
                            "❌ " + Object.values(error).join(" - ");
                    }

                } catch (error) {

                    mensaje.style.display = "block";

                    mensaje.className =
                        "alert alert-danger text-center";

                    mensaje.innerText =
                        "❌ No se pudo conectar con el microservicio Usuarios (8084)";

                    console.error(error);
                }

                setTimeout(() => {

                    mensaje.style.display = "none";

                }, 5000);

            });

    };

</script>

</body>
</html>
