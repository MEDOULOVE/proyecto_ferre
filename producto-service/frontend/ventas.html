<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>DOMACO - Ventas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .contenedor {
            max-width: 900px;
            margin: 40px auto;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: none;
        }
        h1 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .btn-success {
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
        }
        table {
            margin-top: 20px;
        }
        thead {
            background-color: #198754;
            color: white;
        }
    </style>
</head>

<body>

<div class="contenedor">

    <div class="card p-4">
        <h1>Sistema Ventas DOMACO</h1>

        <div id="mensaje" class="alert alert-success text-center d-none"></div>

        <form id="ventaForm">

            <div class="mb-3">
                <label>Cliente</label>
                <input type="text" id="cliente" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Código producto</label>
                <input type="text" id="productoId" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Cantidad</label>
                <input type="number" id="cantidad" class="form-control" required>
            </div>

            <button class="btn btn-success">Registrar Venta</button>

        </form>
    </div>

    <button class="btn btn-dark mb-3 w-100" onclick="mostrarVentas()">
        Ver Lista de Ventas
    </button>

    <div class="card p-4 mt-4" id="contenedorVentas" style="display:none;">

        <table class="table table-bordered table-hover text-center">

            <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Producto</th>
                <th>Código</th>
                <th>Cantidad</th>
                <th>Total</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody id="tablaVentas"></tbody>

        </table>

    </div>

</div>

<script>

    // ================= LISTAR =================
    async function listarVentas() {

      const res = await fetch("https://radiant-magic-production-58df.up.railway.app/ventas");
        const ventas = await res.json();

        const tabla = document.getElementById("tablaVentas");
        tabla.innerHTML = "";

        ventas.forEach(v => {
            tabla.innerHTML += `
<tr>
<td>${v.id}</td>
<td>${v.cliente}</td>
<td>${v.productoNombre}</td>
<td>${v.productoId}</td>
<td>${v.cantidad}</td>
<td>$${v.total}</td>
<td>
<button class="btn btn-danger btn-sm" onclick="eliminarVenta(${v.id})">
Eliminar
</button>
</td>
</tr>
`;
        });
    }

    // ================= GUARDAR VENTA =================
    document.getElementById("ventaForm")
        .addEventListener("submit", async function(e){

            e.preventDefault();

            const venta = {
                cliente: document.getElementById("cliente").value,
                email: document.getElementById("email").value,
                productoId: document.getElementById("productoId").value,
                cantidad: parseInt(document.getElementById("cantidad").value)
            };

          const res = await fetch("https://radiant-magic-production-58df.up.railway.app/ventas", {
                method: "POST",
                headers: {"Content-Type":"application/json"},
                body: JSON.stringify(venta)
            });

            const msg = document.getElementById("mensaje");
            msg.style.display = "block";

            if(res.ok){
                msg.className = "alert alert-success text-center";
                msg.innerText = "✅ Venta registrada y email enviado";
                listarVentas();
                document.getElementById("ventaForm").reset();
            }else{
                const error = await res.text();
                msg.className = "alert alert-danger text-center";
                msg.innerText = "❌ " + error;
            }

            setTimeout(()=> msg.style.display="none",3000);

        });

    // ================= MOSTRAR =================
    function mostrarVentas(){
        const c = document.getElementById("contenedorVentas");
        c.style.display = (c.style.display === "none") ? "block" : "none";
    }

    // ================= ELIMINAR =================
    async function eliminarVenta(id){

       await fetch("https://radiant-magic-production-58df.up.railway.app/ventas/" + id, {
            method:"DELETE"
        });

        listarVentas();
    }

    listarVentas();

</script>

</body>
</html>
